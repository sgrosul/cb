name: CI Lab Pipeline

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-locks.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint:ci

      - name: Run tests
        working-directory: test
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Smoke check build output
        run: node dist/main.js

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          if-no-files-found: error

  deploy:
    name: CD (staging)
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
    concurrency:
      group: staging
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: artifact

      - name: Deploy
        run: bash scripts/deploy.sh artifacts deploy/staging

      - name: Show deployed files
        run: ls -la deploy/staging
